name: ACEest Fitness CI Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # This tells GitHub: "Run the pipeline whenever a tag starting with 'v' is pushed"
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t fitness-app-prod .

      - name: Run Automated Tests
        run: docker run --rm fitness-app-prod xvfb-run python -m pytest